<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldemTemple-Detailed view</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous"/>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<scrip src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
<style>
    .detailed-view-bg-container{
        background-image: url('https://d2clawv67efefq.cloudfront.net/ccbp-static-website/seabg.png');
        background-size:cover;
         height:100vh; 
    }
    .detailed-view-heading{
        font-family:"Roboto";
        color:white;
        font-size:32px;
        font-weight:bold;
        padding:10px;
    }
    .detailed-view-card-container{
        background-color:white;
        border-bottom-right-radius:18px;
        border-bottom-left-radius:18px;
        margin:20px;
    }
    .detailed-view-card-heading{
        color:#0f0e46;
        font-family:"Roboto";
        font-weight:bold;
        font-size:23px;
    }
    .detailed-view-cardd-description{
        font-family:"Roboto";
        font-size:13px;
        color:#6c6b70;
       
    }
    .detailed-view-card-text-container{
        padding:16px;
    }
</style>

</head>
<body>
    <div class="detailed-view-bg-container">
      <h1 class="detailed-view-heading">Detailed View</h1>
      <div class="detailed-view-card-container">
        <div
          id="goldenTempleCarousel"
          class="carousel slide"
          data-ride="carousel"
        >
          <ol class="carousel-indicators">
            <li
              data-target="#goldenTempleCarousel"
              data-slide-to="0"
              class="active"
            ></li>
            <li data-target="#goldenTempleCarousel" data-slide-to="1"></li>
            <li data-target="#goldenTempleCarousel" data-slide-to="2"></li>
          </ol>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/goldentemple1-img.png"
                class="d-block w-100"
                alt="..."
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/goldentemple2-img.png"
                class="d-block w-100"
                alt="..."
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/goldentemple3-img.png"
                class="d-block w-100"
                alt="..."
              />
            </div>
          </div>
          <a
            class="carousel-control-prev"
            href="#goldenTempleCarousel"
            role="button"
            data-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
          </a>
          <a
            class="carousel-control-next"
            href="#goldenTempleCarousel"
            role="button"
            data-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
          </a>
        </div>
        <div class="detailed-view-card-text-container">
          <h1 class="detailed-view-card-heading">Golden Temple</h1>
          <p class="detailed-view-card-description">
            The Golden Temple, also known as Harmandir Sahib is a gurdwara
            located in the city of Amritsar, Punjab, India. There are many
            places to visit Near Golden Temple like Jallianwala Bagh, Wagah
            Border, Harike Wetland, Bathinda Fort.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
